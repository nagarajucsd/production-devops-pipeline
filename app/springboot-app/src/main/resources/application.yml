server:
  port: 8082

spring:
  application:
    name: production-devops-pipeline

  datasource:
    url: jdbc:mysql://localhost:3306/employee_db
    username: devops
    password: devops123 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
    open-in-view: false

management:
  info:
    env:
      enabled: true

  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

info:
  app:
    name: Production DevOps Pipeline
    version: 1.1.0
    description: Enterprise DevOps Demo
    developer: Dandu Rama Siva Naga Raju